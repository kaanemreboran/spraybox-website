<style>
  :root {
    --navy: #14294B; --blue: #2261A8; --blue-light: #5E9AE0; --red: #D31E25;
    --steel: #EEF1F4; --steel-dark: #DBE0E5; --asphalt: #1B2027; --white: #FFFFFF;
    --text-muted: #667080; --green: #1E9E5A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--steel); color: var(--asphalt); line-height: 1.65; }
  h1, h2, h3 { font-family: 'Poppins', sans-serif; font-weight: 600; }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  .container { max-width: 1220px; margin: 0 auto; padding: 0 24px; }

  .topbar { background: var(--asphalt); color: #9AA2AE; font-size: 13px; }
  .topbar .container { display: flex; justify-content: space-between; align-items: center; padding-top: 9px; padding-bottom: 9px; }
  .topbar a { color: #C4CAD2; }
  .topbar a:hover { color: var(--blue-light); }
  .topbar-left { display: flex; align-items: center; gap: 22px; }
  .topbar-left i { color: var(--blue-light); margin-right: 6px; }
  .topbar-center { display: flex; align-items: center; justify-content: center; gap: 32px; }
  .topbar-center i { color: var(--blue-light); margin-right: 6px; }

  header { background: var(--white); border-bottom: 1px solid var(--steel-dark); position: sticky; top: 0; z-index: 200; }
  .header-inner { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; max-width: 1220px; margin: 0 auto; padding: 16px 24px; }
  .logo-wrap { justify-self: start; }
  .logo-link { display: flex; align-items: center; gap: 12px; }
  .logo-link img { height: 80px; width: auto; }
  .logo-text { font-family: 'Anton', sans-serif; font-weight: 400; font-size: 28px; color: var(--navy); letter-spacing: 0.01em; }
  .search-bar { justify-self: center; display: flex; align-items: center; background: var(--steel); border-radius: 24px; padding: 0 6px 0 20px; width: 420px; }
  .search-bar input { flex: 1; border: none; background: transparent; padding: 11px 8px; font-size: 14px; outline: none; }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar button { width: 34px; height: 34px; border-radius: 50%; background: var(--navy); color: var(--white); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .header-actions { justify-self: end; display: flex; align-items: center; gap: 8px; }
  .icon-btn { position: relative; display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 10px; color: var(--navy); font-size: 18px; }
  .icon-btn:hover { background: var(--steel); }
  .cart-badge { position: absolute; top: 3px; right: 3px; background: var(--red); color: var(--white); font-size: 10px; font-weight: 600; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 22px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500; border: 1.5px solid transparent; transition: all 0.15s; }
  .btn-primary { background: var(--blue); color: var(--white); }
  .btn-primary:hover { background: var(--navy); }
  .btn-outline { border-color: var(--navy); color: var(--navy); background: transparent; }
  .btn-outline:hover { background: var(--navy); color: var(--white); }
  .btn-whatsapp { background: #25D366; color: var(--white); }
  .btn-whatsapp:hover { background: #1EB955; }

  .page-head { background: linear-gradient(150deg, var(--asphalt) 0%, var(--navy) 100%); padding: 20px 0; }
  .breadcrumb { font-size: 13px; color: #AEB9C8; }
  .breadcrumb a:hover { color: var(--blue-light); }

  /* ---------- ÜRÜN DETAY ---------- */
  .product-detail { display: grid; grid-template-columns: 460px 1fr; gap: 40px; padding: 36px 0; align-items: start; }

  .detail-image {
    background: var(--white); border: 1px solid var(--steel-dark); border-radius: 14px;
    height: 420px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-family: 'Roboto Mono', monospace; overflow: hidden;
  }
  .detail-image img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }

  .detail-info .cat-label { font-size: 12px; color: var(--blue); font-family: 'Roboto Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; }
  .detail-info h1 { font-size: 26px; color: var(--navy); margin: 10px 0 14px; }

  .campaign-tag { display: inline-block; background: var(--red); color: var(--white); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 12px; }

  .detail-price { font-family: 'Roboto Mono', monospace; font-size: 30px; font-weight: 500; color: var(--navy); margin-bottom: 6px; }
  .stock-info { font-size: 13px; margin-bottom: 22px; }
  .stock-info.var { color: var(--green); }
  .stock-info.yok { color: var(--red); }

  .detail-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 26px; line-height: 1.8; }

  .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
  .qty-control { display: flex; align-items: center; gap: 10px; border: 1px solid var(--steel-dark); border-radius: 8px; padding: 6px 8px; }
  .qty-control button { width: 30px; height: 30px; border-radius: 6px; color: var(--navy); font-size: 15px; }
  .qty-control button:hover { background: var(--steel); }
  .qty-control span { min-width: 24px; text-align: center; font-size: 15px; font-weight: 500; }

  .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .action-row .btn { flex: 1; min-width: 180px; }

  .trust-mini { display: flex; gap: 22px; flex-wrap: wrap; padding-top: 20px; border-top: 1px solid var(--steel-dark); }
  .trust-mini div { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
  .trust-mini i { color: var(--blue); }

  /* ---------- BENZER ÜRÜNLER ---------- */
  .related-section { padding: 20px 0 64px; }
  .related-section h2 { font-size: 20px; color: var(--navy); margin-bottom: 20px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .product-card { background: var(--white); border: 1px solid var(--steel-dark); border-radius: 14px; overflow: hidden; position: relative; }
  .product-thumb { height: 150px; background: linear-gradient(135deg, var(--steel) 0%, var(--steel-dark) 100%); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; font-family: 'Roboto Mono', monospace; overflow: hidden; }
  .product-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 14px; }
  .product-body { padding: 18px; }
  .product-body .cat-label { font-size: 11px; color: var(--blue); font-family: 'Roboto Mono', monospace; letter-spacing: 0.03em; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .product-body h3 { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 12px; min-height: 36px; }
  .product-foot { display: flex; align-items: center; justify-content: space-between; }
  .price { font-family: 'Roboto Mono', monospace; font-weight: 500; font-size: 15px; color: var(--navy); }
  .add-btn { width: 34px; height: 34px; border-radius: 10px; background: var(--navy); color: var(--white); font-size: 16px; }
  .add-btn:hover { background: var(--blue); }

  .not-found { text-align: center; padding: 70px 20px; }
  .not-found i { font-size: 40px; color: var(--steel-dark); margin-bottom: 18px; display: block; }
  .not-found h2 { font-size: 20px; color: var(--navy); margin-bottom: 8px; }
  .not-found p { color: var(--text-muted); margin-bottom: 22px; }

  footer { background: var(--asphalt); color: #8A929E; padding: 44px 0 24px; font-size: 13px; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }

  .whatsapp-float { position: fixed; bottom: 22px; right: 22px; background: #25D366; color: var(--white); width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 14px rgba(0,0,0,0.25); z-index: 200; }

  @media (max-width: 900px) {
    .search-bar { display: none; }
    .header-inner { grid-template-columns: auto auto; }
    .product-detail { grid-template-columns: 1fr; }
    .detail-image { height: 300px; }
    .topbar-center { gap: 18px; font-size: 13px; }
  }

  @media (max-width: 600px) {
    .header-inner { padding: 12px 16px; gap: 12px; }
    .logo-link img { height: 52px; }
    .logo-text { font-size: 20px; }
    .action-row .btn { min-width: 100%; }
    .header-actions .btn-outline { display: none; }
    .header-actions .icon-btn[aria-label="Sipariş Takibi"] { display: none; }
    .topbar-center { gap: 12px; font-size: 11px; }
  }
</style>

<script>
  const SUPABASE_URL = 'https://gbwvmemujyuevaiduyzp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdid3ZtZW11anl1ZXZhaWR1eXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTI3NzMsImV4cCI6MjA5OTIyODc3M30.9k_NFrw00zerGJ61Vzyeqdv4arXsaSAR1YfYsWwUeqs';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(window.location.search);
  const urunId = params.get('id');

  function tl(sayi) {
    return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2 }).format(sayi) + ' TL';
  }

  let secilenAdet = 1;
  let mevcutUrun = null;

  async function baslat() {
    if (!urunId) { gosterBulunamadi(); return; }

    const { data: urun, error } = await db.from('urunler').select('*, kategoriler(ad, slug)').eq('id', urunId).single();

    if (error || !urun) { gosterBulunamadi(); return; }

    mevcutUrun = urun;
    document.getElementById('page-title-tag').textContent = urun.ad + ' | Spraybox';

    const kisaAciklama = (urun.aciklama && urun.aciklama.trim())
      ? urun.aciklama.trim().slice(0, 155)
      : `${urun.ad} — Spraybox otomotiv sarf malzemeleri kataloğunda uygun fiyatlarla.`;

    document.getElementById('meta-desc').setAttribute('content', kisaAciklama);
    document.getElementById('og-title').setAttribute('content', urun.ad + ' | Spraybox');
    document.getElementById('og-desc').setAttribute('content', kisaAciklama);
    if (urun.resim_url) document.getElementById('og-image').setAttribute('content', urun.resim_url);

    let canonicalTag = document.querySelector('link[rel="canonical"]');
    if (!canonicalTag) {
      canonicalTag = document.createElement('link');
      canonicalTag.setAttribute('rel', 'canonical');
      document.head.appendChild(canonicalTag);
    }
    canonicalTag.setAttribute('href', 'https://kaanemreboran.github.io/spraybox-website/urun.html?id=' + urun.id);

    document.getElementById('breadcrumb').innerHTML = `
      <a href="index.html">Anasayfa</a> / <a href="urunler.html">Ürünler</a> /
      ${urun.kategoriler ? `<a href="urunler.html?kategori=${encodeURIComponent(urun.kategoriler.slug)}">${urun.kategoriler.ad}</a> / ` : ''}
      <span>${urun.ad}</span>`;

    const stokVar = urun.stok > 0;

    document.getElementById('detail-container').innerHTML = `
      <div class="product-detail">
        <div class="detail-image">${urun.resim_url ? `<img src="${urun.resim_url}" alt="${urun.ad}">` : 'ürün görseli'}</div>
        <div class="detail-info">
          ${urun.kampanyali ? '<span class="campaign-tag">Kampanya</span>' : ''}
          <span class="cat-label">${urun.kategoriler ? urun.kategoriler.ad : ''}</span>
          <h1>${urun.ad}</h1>
          <div class="detail-price">${tl(urun.fiyat)}</div>
          <div class="stock-info ${stokVar ? 'var' : 'yok'}">
            <i class="fa-solid ${stokVar ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
            ${stokVar ? 'Stokta var' : 'Stokta yok'}
          </div>
          <p class="detail-desc">${urun.aciklama || 'Bu ürün için henüz açıklama eklenmedi.'}</p>
          <div class="qty-row">
            <div class="qty-control">
              <button id="qty-eksi" aria-label="Azalt"><i class="fa-solid fa-minus"></i></button>
              <span id="qty-deger">1</span>
              <button id="qty-arti" aria-label="Artır"><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>
          <div class="action-row">
            <button class="btn btn-primary" id="sepete-ekle-btn" ${stokVar ? '' : 'disabled'}>
              <i class="fa-solid fa-cart-plus"></i> Sepete Ekle
            </button>
            <a href="https://wa.me/905321700984?text=${encodeURIComponent('Merhaba, ' + urun.ad + ' hakkında bilgi almak istiyorum.')}" class="btn btn-whatsapp">
              <i class="fa-brands fa-whatsapp"></i> WhatsApp'tan Sor
            </a>
          </div>
          <div class="trust-mini">
            <div><i class="fa-solid fa-truck-fast"></i> Adana ve çevresine hızlı teslimat</div>
            <div><i class="fa-solid fa-credit-card"></i> Kapıda veya havale ile ödeme</div>
          </div>
        </div>
      </div>
      <div class="related-section">
        <h2>Benzer Ürünler</h2>
        <div class="product-grid" id="related-grid">
          <div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:20px;">Yükleniyor...</div>
        </div>
      </div>
    `;

    document.getElementById('qty-arti').addEventListener('click', () => {
      if (secilenAdet < urun.stok) { secilenAdet++; document.getElementById('qty-deger').textContent = secilenAdet; }
    });
    document.getElementById('qty-eksi').addEventListener('click', () => { if (secilenAdet > 1) { secilenAdet--; document.getElementById('qty-deger').textContent = secilenAdet; } });
    document.getElementById('sepete-ekle-btn').addEventListener('click', () => {
      sepeteEkle({ id: urun.id, ad: urun.ad, fiyat: urun.fiyat, resim_url: urun.resim_url, kategori: urun.kategoriler ? urun.kategoriler.ad : '', stok: urun.stok }, secilenAdet);
    });

    benzerUrunleriGetir(urun);
  }

  async function benzerUrunleriGetir(urun) {
    const grid = document.getElementById('related-grid');
    if (!urun.kategori_id) { grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:20px;">Benzer ürün bulunamadı.</div>'; return; }

    const { data, error } = await db.from('urunler').select('*, kategoriler(ad)').eq('kategori_id', urun.kategori_id).eq('aktif', true).neq('id', urun.id).limit(4);

    if (error || !data || data.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:20px;">Bu kategoride başka ürün yok.</div>';
      return;
    }

    grid.innerHTML = data.map(u => `
      <a href="urun.html?id=${u.id}" class="product-card" style="display:block;">
        ${u.kampanyali ? '<span class="campaign-tag" style="position:absolute; top:12px; left:12px; z-index:2;">Kampanya</span>' : ''}
        <div class="product-thumb">${u.resim_url ? `<img src="${u.resim_url}" alt="${u.ad}">` : 'ürün görseli'}</div>
        <div class="product-body">
          <span class="cat-label">${u.kategoriler ? u.kategoriler.ad : ''}</span>
          <h3>${u.ad}</h3>
          <div class="product-foot"><div class="price">${tl(u.fiyat)}</div></div>
        </div>
      </a>
    `).join('');
  }

  function gosterBulunamadi() {
    document.getElementById('detail-container').innerHTML = `
      <div class="not-found">
        <i class="fa-solid fa-box-open"></i>
        <h2>Ürün bulunamadı</h2>
        <p>Aradığın ürün kaldırılmış veya adres hatalı olabilir.</p>
        <a href="urunler.html" class="btn btn-primary" style="display:inline-flex;">Tüm Ürünlere Dön</a>
      </div>`;
  }

  document.querySelector('.search-bar button').addEventListener('click', () => {
    const val = document.getElementById('search-input').value.trim();
    if (val) window.location.href = 'urunler.html?q=' + encodeURIComponent(val);
  });
  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.querySelector('.search-bar button').click();
  });

  baslat();
</script>
